<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="ShareBoost V6 - Facebook Post Amplification Engine">
  <title>SHAREBOOST V6</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Inter:wght@400;500;600&display=swap"
    rel="stylesheet">
  <style>
    :root {
      --bg: #050510;
      --surface: rgba(15, 10, 30, 0.9);
      --border: rgba(255, 255, 255, 0.08);
      --primary: #d946ef;
      --secondary: #06b6d4;
      --success: #10b981;
      --error: #ef4444;
      --text: #f1f5f9;
      --muted: #94a3b8;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
    }

    .bg {
      position: fixed;
      inset: 0;
      z-index: -1;
      background:
        radial-gradient(circle at 20% 20%, rgba(217, 70, 239, 0.12) 0%, transparent 40%),
        radial-gradient(circle at 80% 80%, rgba(6, 182, 212, 0.12) 0%, transparent 40%);
    }

    .app {
      max-width: 480px;
      margin: 0 auto;
      min-height: 100vh;
      padding-bottom: 80px;
    }

    header {
      padding: 1rem;
      background: rgba(5, 5, 20, 0.95);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: sticky;
      top: 0;
      z-index: 50;
    }

    .logo {
      font-family: 'Orbitron', sans-serif;
      font-weight: 900;
      font-size: 1.2rem;
      background: linear-gradient(135deg, var(--secondary), var(--primary));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .badge {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 0.7rem;
      color: var(--success);
      padding: 4px 10px;
      background: rgba(16, 185, 129, 0.1);
      border: 1px solid rgba(16, 185, 129, 0.3);
      border-radius: 20px;
    }

    .dot {
      width: 6px;
      height: 6px;
      background: var(--success);
      border-radius: 50%;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {

      0%,
      100% {
        opacity: 1;
      }

      50% {
        opacity: 0.5;
      }
    }

    main {
      padding: 1rem;
    }

    .stats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.75rem;
      margin-bottom: 1rem;
    }

    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1rem;
      text-align: center;
    }

    .stat-card.primary {
      border-color: rgba(217, 70, 239, 0.3);
    }

    .stat-card.secondary {
      border-color: rgba(6, 182, 212, 0.3);
    }

    .stat-value {
      font-family: 'Orbitron', sans-serif;
      font-size: 1.8rem;
      font-weight: 900;
      margin: 0.25rem 0;
    }

    .stat-value.primary {
      color: var(--primary);
    }

    .stat-value.secondary {
      color: var(--secondary);
    }

    .stat-label {
      font-size: 0.65rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 1.25rem;
      margin-bottom: 1rem;
    }

    .card-title {
      font-family: 'Orbitron', sans-serif;
      font-size: 0.8rem;
      letter-spacing: 2px;
      margin-bottom: 1rem;
      background: linear-gradient(135deg, var(--secondary), var(--primary));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .form-group {
      margin-bottom: 1rem;
    }

    .form-label {
      display: block;
      font-size: 0.7rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 0.5rem;
    }

    .input {
      width: 100%;
      padding: 0.85rem 1rem;
      background: rgba(0, 0, 0, 0.4);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-family: 'Inter', sans-serif;
      font-size: 0.9rem;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .input:focus {
      outline: none;
      border-color: var(--secondary);
      box-shadow: 0 0 0 3px rgba(6, 182, 212, 0.15);
    }

    .input::placeholder {
      color: rgba(255, 255, 255, 0.2);
    }

    textarea.input {
      min-height: 70px;
      resize: none;
    }

    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.75rem;
    }

    .btn {
      width: 100%;
      padding: 1rem;
      border: none;
      border-radius: 12px;
      font-family: 'Orbitron', sans-serif;
      font-size: 0.85rem;
      font-weight: 700;
      letter-spacing: 2px;
      cursor: pointer;
      transition: transform 0.15s, filter 0.2s;
      background: linear-gradient(135deg, var(--secondary), var(--primary));
      color: white;
    }

    .btn:hover {
      filter: brightness(1.1);
    }

    .btn:active {
      transform: scale(0.97);
    }

    .section-title {
      font-family: 'Orbitron', sans-serif;
      font-size: 0.75rem;
      letter-spacing: 1px;
      margin-bottom: 0.75rem;
      color: var(--muted);
    }

    .session-list {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    .session {
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 0.85rem;
    }

    .session-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 0.5rem;
    }

    .session-id {
      font-family: 'Orbitron', sans-serif;
      font-size: 0.6rem;
      color: var(--secondary);
    }

    .session-status {
      font-size: 0.6rem;
      padding: 2px 8px;
      border-radius: 10px;
      background: rgba(6, 182, 212, 0.15);
      color: var(--secondary);
    }

    .session-status.error {
      background: rgba(239, 68, 68, 0.15);
      color: var(--error);
    }

    .session-status.done {
      background: rgba(16, 185, 129, 0.15);
      color: var(--success);
    }

    .session-url {
      font-size: 0.75rem;
      color: var(--muted);
      word-break: break-all;
      margin-bottom: 0.5rem;
    }

    .progress {
      height: 4px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 2px;
      overflow: hidden;
      margin-bottom: 0.5rem;
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--secondary), var(--primary));
      transition: width 0.3s ease;
    }

    .session-meta {
      display: flex;
      justify-content: space-between;
      font-size: 0.65rem;
      color: var(--muted);
    }

    .empty {
      text-align: center;
      padding: 2rem;
      color: var(--muted);
      font-size: 0.8rem;
    }

    nav {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: rgba(5, 5, 20, 0.95);
      backdrop-filter: blur(10px);
      border-top: 1px solid var(--border);
      display: flex;
      justify-content: space-around;
      padding: 0.75rem;
      z-index: 50;
    }

    .nav-btn {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      color: var(--muted);
      text-decoration: none;
      font-size: 0.6rem;
      padding: 0.5rem 1rem;
      border-radius: 10px;
      transition: all 0.2s;
      background: none;
      border: none;
      cursor: pointer;
    }

    .nav-btn.active {
      color: var(--secondary);
    }

    .nav-btn.active::before {
      content: '';
      position: absolute;
      top: -1px;
      left: 20%;
      right: 20%;
      height: 2px;
      background: var(--secondary);
    }

    #toast {
      position: fixed;
      top: 80px;
      left: 50%;
      transform: translateX(-50%);
      background: var(--surface);
      border: 1px solid var(--secondary);
      padding: 10px 20px;
      border-radius: 30px;
      font-size: 0.75rem;
      z-index: 100;
      opacity: 0;
      transition: opacity 0.3s;
    }

    #toast.show {
      opacity: 1;
    }
  </style>
</head>

<body>

  <div class="bg"></div>

  <div class="app">
    <header>
      <div class="logo">SHAREBOOST</div>
      <div class="badge">
        <span class="dot"></span>
        LIVE
      </div>
    </header>

    <main>
      <div class="stats">
        <div class="stat-card primary">
          <div class="stat-label">Active</div>
          <div class="stat-value primary" id="activeCount">0</div>
        </div>
        <div class="stat-card secondary">
          <div class="stat-label">Total</div>
          <div class="stat-value secondary" id="totalCount">0</div>
        </div>
      </div>

      <div class="card" id="homeView">
        <div class="card-title">⚡ MISSION CONFIG</div>

        <form id="form">
          <div class="form-group">
            <label class="form-label">Facebook Cookies</label>
            <textarea class="input" id="cookieInput" placeholder="Paste cookies..."></textarea>
          </div>

          <div class="form-group">
            <label class="form-label">Post URL</label>
            <input type="url" class="input" id="urlInput" placeholder="https://facebook.com/...">
          </div>

          <div class="form-row">
            <div class="form-group">
              <label class="form-label">Amount</label>
              <input type="number" class="input" id="amountInput" placeholder="100" min="1">
            </div>
            <div class="form-group">
              <label class="form-label">Delay (s)</label>
              <input type="number" class="input" id="intervalInput" placeholder="5" min="1">
            </div>
          </div>

          <button type="submit" class="btn">🚀 IGNITE</button>
        </form>
      </div>

      <div class="section-title">RECENT ACTIVITY</div>
      <div class="session-list" id="sessions"></div>
    </main>

    <nav>
      <button class="nav-btn active" data-view="home">Home</button>
      <button class="nav-btn" data-view="sessions">Sessions</button>
    </nav>
  </div>

  <div id="toast"></div>

  <script>
    // State
    let sessions = [];

    // DOM Elements
    const form = document.getElementById('form');
    const cookieInput = document.getElementById('cookieInput');
    const urlInput = document.getElementById('urlInput');
    const amountInput = document.getElementById('amountInput');
    const intervalInput = document.getElementById('intervalInput');
    const activeCount = document.getElementById('activeCount');
    const totalCount = document.getElementById('totalCount');
    const sessionsEl = document.getElementById('sessions');
    const toast = document.getElementById('toast');

    // Toast
    const showToast = (msg) => {
      toast.textContent = msg;
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 3000);
    };

    // Navigation
    document.querySelectorAll('.nav-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
      });
    });

    // Fetch Sessions
    const fetchSessions = async () => {
      try {
        const res = await fetch('/total');
        sessions = await res.json();
        updateUI();
      } catch (e) {
        console.error('Fetch failed:', e);
      }
    };

    // Update UI
    const updateUI = () => {
      const active = sessions.filter(s => !s.error && s.count < s.target).length;
      const total = sessions.reduce((a, s) => a + s.count, 0);

      activeCount.textContent = active;
      totalCount.textContent = total;

      if (sessions.length === 0) {
        sessionsEl.innerHTML = '<div class="empty">No active sessions</div>';
        return;
      }

      sessionsEl.innerHTML = sessions.slice(0, 5).map((s, i) => {
        const pct = Math.min(100, Math.round((s.count / s.target) * 100));
        const status = s.error ? 'error' : (s.count >= s.target ? 'done' : 'running');
        const statusText = s.error ? 'ERROR' : (s.count >= s.target ? 'DONE' : 'RUNNING');

        return `
          <div class="session">
            <div class="session-header">
              <span class="session-id">#${i + 1}</span>
              <span class="session-status ${status}">${statusText}</span>
            </div>
            <div class="session-url">${s.url}</div>
            <div class="progress"><div class="progress-fill" style="width:${pct}%"></div></div>
            <div class="session-meta">
              <span>${s.count} / ${s.target}</span>
              <span>${s.interval}s</span>
            </div>
          </div>
        `;
      }).join('');
    };

    // Form Submit
    form.addEventListener('submit', async (e) => {
      e.preventDefault();

      const data = {
        cookie: cookieInput.value,
        url: urlInput.value,
        amount: amountInput.value,
        interval: intervalInput.value
      };

      if (!data.cookie || !data.url || !data.amount || !data.interval) {
        showToast('Fill all fields');
        return;
      }

      showToast('Starting boost...');

      try {
        const res = await fetch('/api/submit', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(data)
        });

        const result = await res.json();

        if (res.ok) {
          showToast('Boost started!');
          form.reset();
        } else {
          showToast(result.error || 'Failed');
        }
      } catch (e) {
        showToast('Network error');
      }
    });

    // Poll
    setInterval(fetchSessions, 2000);
    fetchSessions();
  </script>
</body>

</html>
